services:
  mcp-pokemon-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8000
      - MCP_TRANSPORT=streamable-http
      - LOG_LEVEL=INFO
      - POKEAPI_BASE_URL=https://pokeapi.co/api/v2
      - REDIS_URL=redis://:${REDIS_PASSWORD:-mcp_redis_secret}@redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-mcp_redis_secret}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
      - UVICORN_TIMEOUT_KEEP_ALIVE=${UVICORN_TIMEOUT_KEEP_ALIVE:-30}
      - UVICORN_ACCESS_LOG=${UVICORN_ACCESS_LOG:-true}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - mcp_logs:/app/logs
    networks:
      - dokploy-network
      - mcp-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(5); s.connect(('localhost', 8000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp-pokemon.rule=Host(`mcp-pokemon.shimadev.xyz`)"
      - "traefik.http.routers.mcp-pokemon.entrypoints=websecure"
      - "traefik.http.routers.mcp-pokemon.tls.certresolver=letsencrypt"
      - "traefik.http.services.mcp-pokemon.loadbalancer.server.port=8000"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - mcp-internal
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-mcp_redis_secret}
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
      --rename-command DEBUG ""
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mcp_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

networks:
  dokploy-network:
    external: true
  mcp-internal:
    driver: bridge
    internal: true

volumes:
  redis_data:
  mcp_logs:
